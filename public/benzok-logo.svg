<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 90" fill="none">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0d8e8"/>
    </linearGradient>
    <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ee86e"/>
      <stop offset="100%" stop-color="#22a022"/>
    </linearGradient>
    <linearGradient id="yg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffe04a"/>
      <stop offset="60%" stop-color="#ffb800"/>
      <stop offset="100%" stop-color="#e07000"/>
    </linearGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb800"/>
      <stop offset="100%" stop-color="#e07000" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000040"/>
    </filter>
    <filter id="gs" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00880040"/>
    </filter>
  </defs>

  <!-- Speed lines -->
  <rect x="2" y="28" width="28" height="9" rx="4.5" fill="url(#sg)"/>
  <rect x="2" y="43" width="20" height="7" rx="3.5" fill="url(#sg)" opacity="0.65"/>
  <rect x="2" y="57" width="13" height="5" rx="2.5" fill="url(#sg)" opacity="0.35"/>

  <!-- "Бенз" -->
  <text x="38" y="76"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900" font-size="70" font-style="italic"
    fill="url(#wg)" filter="url(#ds)">Бенз</text>

  <!-- Smiley face body -->
  <circle cx="264" cy="45" r="38" fill="url(#yg)" filter="url(#ds)"/>
  <!-- Shine -->
  <ellipse cx="252" cy="30" rx="12" ry="8" fill="white" opacity="0.30" transform="rotate(-20 252 30)"/>

  <!-- Left 👌 hand (thumb+index ring, fingers up) -->
  <!-- Ring -->
  <circle cx="227" cy="52" r="12" fill="#ffe8b0" stroke="#e09000" stroke-width="1.5"/>
  <circle cx="227" cy="52" r="6" fill="url(#yg)"/>
  <!-- Fingers up -->
  <rect x="218" y="18" width="9" height="30" rx="4.5" fill="#ffe8b0" stroke="#e09000" stroke-width="1"/>
  <rect x="228" y="14" width="9" height="32" rx="4.5" fill="#ffe8b0" stroke="#e09000" stroke-width="1"/>
  <rect x="238" y="20" width="8" height="26" rx="4" fill="#ffe8b0" stroke="#e09000" stroke-width="1"/>

  <!-- Right 👌 hand (mirror) -->
  <!-- Ring -->
  <circle cx="301" cy="52" r="12" fill="#ffe8b0" stroke="#e09000" stroke-width="1.5"/>
  <circle cx="301" cy="52" r="6" fill="url(#yg)"/>
  <!-- Fingers up -->
  <rect x="301" y="18" width="9" height="30" rx="4.5" fill="#ffe8b0" stroke="#e09000" stroke-width="1"/>
  <rect x="291" y="14" width="9" height="32" rx="4.5" fill="#ffe8b0" stroke="#e09000" stroke-width="1"/>
  <rect x="281" y="20" width="8" height="26" rx="4" fill="#ffe8b0" stroke="#e09000" stroke-width="1"/>

  <!-- Face: left eye (wink) -->
  <path d="M248 38 Q252 34 256 38" stroke="#3a2000" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Face: right eye -->
  <circle cx="275" cy="37" r="4.5" fill="#3a2000"/>
  <circle cx="276.5" cy="35.5" r="1.5" fill="white"/>
  <!-- Face: smile -->
  <path d="M249 54 Q264 66 279 54" stroke="#3a2000" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Green "К" -->
  <text x="316" y="76"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900" font-size="70" font-style="italic"
    fill="url(#gg)" filter="url(#gs)">К</text>

  <!-- Underline swoosh -->
  <path d="M 38 83 Q 200 94 380 78" stroke="url(#yg)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
</svg>
